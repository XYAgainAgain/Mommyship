<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supermassive Masshole</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; background: #000; height: 100%; }
  .experience { position: fixed; width: 100vw; height: 100vh; }
  .fly-home {
    position: fixed;
    top: 1.2rem;
    left: 1.2rem;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 2.4rem;
    height: 2.4rem;
    color: #fffaff;
    background: rgba(13, 13, 26, 0.4);
    border: none;
    border-radius: 50%;
    padding: 0;
    cursor: pointer;
    text-decoration: none;
    filter: drop-shadow(0 0 6px rgba(131, 50, 172, 0.5));
    transition: filter 0.2s, transform 0.2s;
  }
  .fly-home svg {
    width: 1.4rem;
    height: 1.4rem;
    fill: #fffaff;
  }
  .fly-home:hover {
    filter: drop-shadow(0 0 12px rgba(131, 50, 172, 0.8)) drop-shadow(0 0 4px rgba(246, 121, 229, 0.4));
    transform: scale(1.1);
  }
</style>
</head>
<body>
<div class="experience"></div>
<a class="fly-home" id="fly-home" title="Fly Home!"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="m13.13 22.19-1.63-3.83c1.57-.58 3.04-1.36 4.4-2.27zM5.64 12.5l-3.83-1.63 6.1-2.77C7 9.46 6.22 10.93 5.64 12.5M21.61 2.39S16.66.269 11 5.93c-2.19 2.19-3.5 4.6-4.35 6.71-.28.75-.09 1.57.46 2.13l2.13 2.12c.55.56 1.37.74 2.12.46A19.1 19.1 0 0 0 18.07 13c5.66-5.66 3.54-10.61 3.54-10.61m-7.07 7.07c-.78-.78-.78-2.05 0-2.83s2.05-.78 2.83 0c.77.78.78 2.05 0 2.83s-2.05.78-2.83 0m-5.66 7.07-1.41-1.41zM6.24 22l3.64-3.64c-.34-.09-.67-.24-.97-.45L4.83 22zM2 22h1.41l4.77-4.76-1.42-1.41L2 20.59zm0-2.83 4.09-4.08c-.21-.3-.36-.62-.45-.97L2 17.76z"/></svg></a>
<script>
  document.getElementById('fly-home').addEventListener('click', function(e) {
    e.preventDefault();
    var returnUrl = sessionStorage.getItem('mommyship-return-url');
    if (returnUrl) {
      sessionStorage.removeItem('mommyship-return-url');
      window.location.href = returnUrl;
    } else {
      window.location.href = './';
    }
  });
</script>
<script src="assets/masshole.js"></script>
<script>
(function() {
  var audio = new Audio('assets/audio/Muse - Supermassive Black Hole.ogg');
  audio.loop = true;
  audio.preload = 'auto';

  var IR_PATHS = [
    'assets/audio/ir/ShortDecay.ogg',
    'assets/audio/ir/MedDecay.ogg',
    'assets/audio/ir/LongDecay.ogg',
    'assets/audio/ir/EchoBounce.ogg'
  ];

  var ctx, masterGain, dryGain, irGains, started = false;

  function loadIR(url) {
    return fetch(url)
      .then(function(r) { return r.arrayBuffer(); })
      .then(function(buf) { return ctx.decodeAudioData(buf); });
  }

  function initAudio() {
    if (started) return;
    started = true;

    ctx = new AudioContext();
    var source = ctx.createMediaElementSource(audio);

    masterGain = ctx.createGain();
    masterGain.gain.value = computeVolume(getNormalizedDist());
    masterGain.connect(ctx.destination);

    dryGain = ctx.createGain();
    dryGain.connect(masterGain);
    source.connect(dryGain);

    /* Four parallel convolvers, one per IR, each with its own gain for crossfading */
    irGains = IR_PATHS.map(function() {
      var g = ctx.createGain();
      g.gain.value = 0;
      g.connect(masterGain);
      return g;
    });

    /* Load IRs individually so one failure doesn't block the others */
    IR_PATHS.forEach(function(url, i) {
      loadIR(url).then(function(buf) {
        var conv = ctx.createConvolver();
        conv.buffer = buf;
        source.connect(conv);
        conv.connect(irGains[i]);
      }).catch(function() {});
    });

    audio.play().catch(function() {});
    tick();
  }

  /* OrbitControls applies one fixed 0.95^zoomSpeed factor per input event,
     ignoring delta magnitude. We mirror all three dolly inputs: scroll wheel,
     middle-mouse drag, and touch pinch */
  var ZOOM_FACTOR = Math.pow(0.95, 0.25);
  var distance = 7.4; /* sqrt(5^2 + 2^2 + 5^2), matching camera start position */
  var NEAR = 1.5;
  var FAR = 350; /* just inside the 400-unit starfield sphere */
  var MAX_DIST = FAR;
  var MAX_VOL = 0.65;
  var MIN_VOL = 0.02;

  function clampDist() { distance = Math.max(0.1, Math.min(MAX_DIST, distance)); }

  /* Returns true if a zoom-out input should be blocked (at the wall) */
  function atZoomOutLimit() { return distance >= MAX_DIST; }

  /* Capture-phase listeners intercept events before OrbitControls sees them,
     letting us enforce the zoom-out ceiling on the actual camera too */
  document.addEventListener('wheel', function(e) {
    if (e.deltaY > 0 && atZoomOutLimit()) {
      e.stopPropagation();
      e.preventDefault();
      return;
    }
    if (e.deltaY < 0) distance *= ZOOM_FACTOR;
    else if (e.deltaY > 0) distance /= ZOOM_FACTOR;
    clampDist();
  }, { capture: true });

  /* Middle-mouse dolly: OrbitControls applies one factor per pointermove
     that has any vertical delta, regardless of how many pixels moved */
  var dollyActive = false;
  var lastDollyY = 0;

  document.addEventListener('pointerdown', function(e) {
    if (e.button !== 1) return;
    dollyActive = true;
    lastDollyY = e.clientY;
  });

  document.addEventListener('pointermove', function(e) {
    if (!dollyActive) return;
    var dy = e.clientY - lastDollyY;
    if (dy > 0 && atZoomOutLimit()) {
      e.stopPropagation();
      lastDollyY = e.clientY;
      return;
    }
    if (dy > 0) distance /= ZOOM_FACTOR;
    else if (dy < 0) distance *= ZOOM_FACTOR;
    lastDollyY = e.clientY;
    clampDist();
  }, { capture: true });

  document.addEventListener('pointerup', function(e) {
    if (e.button === 1) dollyActive = false;
  });

  /* Touch pinch-zoom */
  var lastPinchDist = 0;
  document.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      var dx = e.touches[0].pageX - e.touches[1].pageX;
      var dy = e.touches[0].pageY - e.touches[1].pageY;
      lastPinchDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (e.touches.length !== 2) return;
    var dx = e.touches[0].pageX - e.touches[1].pageX;
    var dy = e.touches[0].pageY - e.touches[1].pageY;
    var pinchDist = Math.sqrt(dx * dx + dy * dy);
    if (lastPinchDist > 0) {
      /* Block pinch-zoom-out at the limit */
      if (pinchDist < lastPinchDist && atZoomOutLimit()) {
        lastPinchDist = pinchDist;
        return;
      }
      distance *= lastPinchDist / pinchDist;
      clampDist();
    }
    lastPinchDist = pinchDist;
  }, { passive: true });

  /* Shared normalized distance (0 = closest, 1 = farthest) */
  var MAX_WET = 0.7;

  function getNormalizedDist() {
    var t = (distance - NEAR) / (FAR - NEAR);
    return Math.max(0, Math.min(1, t));
  }

  function computeVolume(t) {
    return MIN_VOL + (MAX_VOL - MIN_VOL) * (1 - t) * (1 - t);
  }

  /* Crossfade 4 IRs across the distance range. At any point, at most two
     adjacent IRs are active with gains that sum to 1.0. Dry signal fades
     as wet increases so the reverb doesn't just pile on top */
  function computeReverbMix(t) {
    var wet = t * MAX_WET;
    var dry = 1.0 - wet;

    /* Position within the 4 IRs (0–3 range). Each IR owns a unit-width zone;
       the fractional part drives the crossfade between neighbors */
    var pos = t * 3;
    var lo = Math.min(Math.floor(pos), 3);
    var hi = Math.min(lo + 1, 3);
    var blend = pos - lo;

    var gains = [0, 0, 0, 0];
    gains[lo] += (1 - blend) * wet;
    gains[hi] += blend * wet;

    return { dry: dry, ir: gains };
  }

  function tick() {
    requestAnimationFrame(tick);
    if (!masterGain) return;

    var now = ctx.currentTime;
    var smooth = 0.05;
    var t = getNormalizedDist();
    masterGain.gain.setTargetAtTime(computeVolume(t), now, smooth);

    if (!irGains) return;
    var mix = computeReverbMix(t);
    dryGain.gain.setTargetAtTime(mix.dry, now, smooth);
    for (var i = 0; i < 4; i++) {
      irGains[i].gain.setTargetAtTime(mix.ir[i], now, smooth);
    }
  }

  document.addEventListener('pointerdown', initAudio, { once: true });
  document.addEventListener('wheel', initAudio, { once: true });
})();
</script>
</body>
</html>
