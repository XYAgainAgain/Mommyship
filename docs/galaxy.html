<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy Map — Mommyship</title>
  <link rel="icon" href="assets/favicon.png">
  <link rel="stylesheet" href="galaxy/galaxy.css">
</head>
<body>
  <a class="fly-home" id="fly-home" href="#" role="button" aria-label="Return to Mommyship" title="Fly Home!">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="m13.13 22.19-1.63-3.83c1.57-.58 3.04-1.36 4.4-2.27zM5.64 12.5l-3.83-1.63 6.1-2.77C7 9.46 6.22 10.93 5.64 12.5M21.61 2.39S16.66.269 11 5.93c-2.19 2.19-3.5 4.6-4.35 6.71-.28.75-.09 1.57.46 2.13l2.13 2.12c.55.56 1.37.74 2.12.46A19.1 19.1 0 0 0 18.07 13c5.66-5.66 3.54-10.61 3.54-10.61m-7.07 7.07c-.78-.78-.78-2.05 0-2.83s2.05-.78 2.83 0c.77.78.78 2.05 0 2.83s-2.05.78-2.83 0m-5.66 7.07-1.41-1.41zM6.24 22l3.64-3.64c-.34-.09-.67-.24-.97-.45L4.83 22zM2 22h1.41l4.77-4.76-1.42-1.41L2 20.59zm0-2.83 4.09-4.08c-.21-.3-.36-.62-.45-.97L2 17.76z"/></svg>
  </a>
  <div class="gx-controls">
    <div class="gx-controls-row">
      <div class="gx-controls-col">
        <div class="gx-controls-row">
          <label class="gx-toggle">
            <input type="checkbox" id="fancy-nebulae">
            <span>Fancy Nebulae</span>
          </label>
          <label class="gx-toggle gx-cinema-toggle" id="cinema-toggle">
            <input type="checkbox" id="absolute-cinema">
            <span>Absolute Cinema</span>
          </label>
        </div>
        <div class="gx-controls-row">
          <label class="gx-toggle">
            <input type="checkbox" id="pause-rotation">
            <span>Pause Rotation</span>
          </label>
          <label class="gx-toggle">
            <input type="checkbox" id="muse-mode">
            <span>Muse Mode</span>
          </label>
        </div>
      </div>
      <div class="gx-volume" id="muse-volume-wrap">
        <input type="range" id="muse-volume" min="0" max="100" value="50" orient="vertical">
      </div>
    </div>
  </div>
  <div class="gx-controls-guide">
    <b>Left Drag</b> Rotate<br>
    <b>Right Drag</b> Pan<br>
    <b>Scroll</b> Zoom<br>
    <b>W/S</b> Forward/Back<br>
    <b>A/D</b> Strafe<br>
    <b>Q/E</b> Orbit<br>
    <b>Space/Ctrl</b> Up/Down<br>
    <b>Shift</b> Sprint<br>
    <b>Left Click</b> Select<br>
    <b>Right Click</b> Track<br>
    <span class="guide-track">While tracking:<br>
    <b>A/D</b> Orbit H<br>
    <b>Space/Ctrl</b> Orbit V<br>
    <b>Right Click</b> Release</span>
  </div>
  <script>
    document.getElementById('fly-home').addEventListener('click', function(e) {
      e.preventDefault();
      var returnUrl = sessionStorage.getItem('mommyship-return-url');
      if (returnUrl) {
        sessionStorage.removeItem('mommyship-return-url');
        window.location.href = returnUrl;
      } else {
        window.location.href = './';
      }
    });
  </script>
  <div class="scale-bar" id="scale-bar">
    <div class="scale-bar-line" id="scale-bar-line"></div>
    <div class="scale-bar-label" id="scale-bar-label"></div>
  </div>
  <div class="gx-hud" id="gx-hud"></div>
  <div class="experience"></div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="galaxy/galaxy.js"></script>
</body>
</html>
